<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <h2>Smart Calculator</h2>

    <!--
        Display panel:
        - #expression  → shows the full expression being built (dim, small)
        - #display     → shows current number being entered OR the result
    -->
    <div class="display-panel" id="displayPanel">
        <div id="expression"></div>
        <div id="display">0</div>
    </div>

    <!--
        Button grid — 4 columns.

        Row 1: C  DEL  %  ÷
        Row 2: 7  8    9  ×
        Row 3: 4  5    6  −
        Row 4: 1  2    3  = (rowspan 2)
        Row 5: 0 (colspan 2)  .

        The = button uses grid-row: span 2 so it fills rows 4 and 5
        at full height, perfectly aligned with 1–3 and 0–.
    -->
    <div class="buttons">

        <!-- Row 1 -->
        <button data-value="C"   class="action"   aria-label="Clear">C</button>
        <button data-value="DEL" class="action"   aria-label="Delete">DEL</button>
        <button data-value="%"   class="fn"       aria-label="Percent">%</button>
        <button data-value="/"   class="operator" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="*" class="operator" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="-" class="operator" aria-label="Subtract">−</button>

        <!-- Row 4  (= spans rows 4 and 5) -->
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="=" class="equals" aria-label="Equals">=</button>

        <!-- Row 5 -->
        <button data-value="0" class="zero" aria-label="Zero">0</button>
        <button data-value=".">.</button>

    </div>
</div>

<script src="index.js"></script>
</body>
</html>
